packages:
  - "packages/*"

# pnpm blocks postinstall/build scripts for dependencies by default as a
# security measure (this is *not* something a project's own .npmrc/config
# is allowed to bypass — it's intentionally global-config-only). Any
# unapproved ("ignored") build script also makes `pnpm run <script>` /
# `pnpm dev` etc. fail outright (pnpm's implicit pre-run dependency check),
# not just `pnpm install` — so everything with a required build script must
# be listed here.
#
# This list was generated by running `pnpm approve-builds --all` and
# reflects exactly what `pnpm install` reports as needing approval:
#   - ffmpeg-static: downloads the bundled ffmpeg binary
#   - @go-task/cli:  downloads the `task` binary used by every command in
#                     this project (Taskfile.yml, and the `pnpm run ...`
#                     aliases in package.json which just call `task ...`)
#   - esbuild:       used transitively by tsx/vitest
#
# If `pnpm install` fails while downloading one of these (e.g. a restrictive
# corporate proxy blocking GitHub release downloads), see the troubleshooting
# section in README-ja.md — the short version: retry, or install ffmpeg/Task
# manually (they'll be picked up / used automatically once on PATH).
allowBuilds:
  '@go-task/cli': true
  esbuild: true
  ffmpeg-static: true
