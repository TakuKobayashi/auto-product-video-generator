name: Generate Demo Video

on:
  workflow_dispatch:
    inputs:
      repo_url:
        description: "Git repository URL to analyze (the project the video is about)"
        required: true
      repo_ref:
        description: "Branch/tag/commit to check out (optional)"
        required: false
        default: ""
      target_url:
        description: "URL where the app will be running (started by a step you add below, or a deployed URL)"
        required: true
        default: "http://localhost:3000"
      video_type:
        description: "Video type"
        required: true
        default: "demo"
        type: choice
        options: [teaser, shorts, demo, tutorial]
      preview:
        description: "Render preview quality (faster)"
        required: false
        default: "false"
        type: boolean
      llm_provider:
        description: "LLM provider to use"
        required: true
        default: "gemini"
        type: choice
        options: [gemini, ollama]

jobs:
  generate:
    runs-on: ubuntu-latest

    services:
      voicevox:
        image: voicevox/voicevox_engine:cpu-ubuntu20.04-latest
        ports:
          - 50021:50021
        options: >-
          --health-cmd "curl -sf http://localhost:50021/version"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable corepack (pnpm)
        run: corepack enable

      # Installs the `task` binary via the official GitHub Action rather
      # than relying on @go-task/cli's npm postinstall — more reliable in
      # CI, and doesn't require pnpm's build-script allowlist for it.
      - uses: arduino/setup-task@v2
        with:
          version: 3.x

      # Single command sets up Node deps + ffmpeg/ffprobe (bundled via
      # ffmpeg-static/ffprobe-static) + Playwright Chromium. Ollama is only
      # installed/pulled when the workflow was dispatched with
      # llm_provider: ollama, using the "ci" machine profile (a smaller
      # model sized for CPU-only runners — see Taskfile.yml).
      - name: Install environment
        run: |
          task install \
            PROFILE=ci \
            WITH_OLLAMA=${{ inputs.llm_provider == 'ollama' && 'true' || 'false' }}

      # demo-video-gen's bin/ loads packages/cli/dist/index.js — it has to
      # be built before `pnpm demo-video-gen ...` will work.
      - name: Build demo-video-gen
        run: task build

      - name: Start local services
        run: |
          task serve \
            PROFILE=ci \
            WITH_OLLAMA=${{ inputs.llm_provider == 'ollama' && 'true' || 'false' }}
        # Note: the `voicevox` service container above already provides
        # VOICEVOX on :50021, so this will detect it's healthy and only
        # start Ollama (if requested) here.

      # NOTE: this only analyzes and records against `target_url` — it does
      # NOT start your app for you. If the app being demoed needs to be
      # running (e.g. a Next.js dev server) add a step here to start it
      # in the background before "Analyze & build video" runs, and make
      # sure `target_url` matches wherever it ends up listening.

      - name: Initialize project config
        run: |
          pnpm demo-video-gen init \
            --repo "${{ inputs.repo_url }}" \
            ${{ inputs.repo_ref != '' && format('--ref "{0}"', inputs.repo_ref) || '' }} \
            --url "${{ inputs.target_url }}" \
            --type "${{ inputs.video_type }}"

      - name: Set LLM provider in config
        if: inputs.llm_provider == 'ollama'
        run: |
          sed -i 's/provider: ollama/provider: ollama/; s/provider: gemini/provider: ollama/' dvg.config.yaml
          sed -i 's/model: gemini-2.5-pro/model: qwen2.5:3b-instruct/' dvg.config.yaml

      - name: Analyze & build video
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          PREVIEW_FLAG=""
          if [ "${{ inputs.preview }}" = "true" ]; then
            PREVIEW_FLAG="--preview"
          fi
          pnpm demo-video-gen build \
            --url "${{ inputs.target_url }}" \
            --type "${{ inputs.video_type }}" \
            $PREVIEW_FLAG

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: demo-video-${{ inputs.video_type }}-${{ github.run_id }}
          path: output/final.mp4
          retention-days: 14
          if-no-files-found: error

      - name: Upload intermediate files
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dvg-workdir-${{ github.run_id }}
          path: |
            .dvg/source-context.json
            .dvg/project-summary.json
            .dvg/scenario.yaml
            .dvg/script.yaml
            .dvg/subtitles.srt
            .dvg/timeline.json
          retention-days: 7
